[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/forge-std/lib/openzeppelin-contracts/"
]

[profile.rpc-endpoints]
sepolia = "https://rpc.sepolia.linea.build"
hedera-testnet = "https://testnet.hashio.io/api"
hedera-mainnet = "https://mainnet.hashio.io/api"

# Hedera-specific optimizations
[profile.hedera]
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
